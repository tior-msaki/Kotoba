<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kotoba - Home</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background: #FFFFFF;
        }

        body {
            opacity: 0;
            transition: opacity 0.15s ease;
        }

        body.page-ready {
            opacity: 1;
        }

        .viewport {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .home-page {
            position: relative;
            width: 1440px;
            height: 1024px;
            background: #FFFFFF;
            transform-origin: center center;
            flex-shrink: 0;
        }

        .home-page > div {
            background-repeat: no-repeat;
            background-size: contain;
            user-select: none;
            -webkit-user-drag: none;
        }

        .bunny-cards,
        .cds,
        .settings {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease, top 0.3s ease;
        }

        .home-page.menu-open .bunny-cards,
        .home-page.menu-open .cds,
        .home-page.menu-open .settings {
            opacity: 1;
            pointer-events: auto;
        }

        .home-page.menu-open .cds {
            top: 189px;
        }

        .home-page.menu-open .settings {
            top: 276px;
        }

        .arrow {
            cursor: pointer;
            transition: top 0.3s ease, transform 0.3s ease;
        }

        .cd-player {
            z-index: 5;
        }

        .table {
            position: absolute;
            width: 1440px;
            height: 932px;
            left: 0px;
            top: 47px;
            background-image: url("assets/home/table.png");
            display: none;
        }

        .playlist-intro {
            position: absolute;
            width: 273px;
            height: 240px;
            left: 872px;
            top: 409px;
            background-image: url("assets/home/case.png");
            display: none;

        .home-page.first-visit {
            cursor: pointer;
        }

        .home-page.first-visit > div {
            display: none;
        }

        .home-page.first-visit .table,
        .home-page.first-visit .playlist-intro,
        .home-page.first-visit .disk,
        .home-page.first-visit .playlist-bubble {
            display: block;
        }

        .home-page.first-visit .playlist-bubble {
            opacity: 1;
            left: 872px;
            top: 378px;
        }

        .home-page.menu-open .arrow {
            top: 367px;
            transform: rotate(180deg);
        }

        .desktop-bubble,
        .notes-bubble,
        .playlist-bubble,
        .dictionary-bubble,
        .photocard-bubble,
        .enter-cd-bubble {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.15s ease;
            z-index: 100;
        }

        .laptop:hover ~ .desktop-bubble,
        .notes:hover ~ .notes-bubble,
        .photocards:hover ~ .photocard-bubble,
        .cd-player:hover ~ .enter-cd-bubble,
        .disk:hover ~ .playlist-bubble,
        .dictionary:hover ~ .dictionary-bubble {
            opacity: 1;
        }

        .laptop,
        .notes,
        .photocards,
        .dictionary,
        .disk,
        .cd-player,
        .bunny-cards,
        .cds,
        .settings {
            transition: filter 0.2s ease;
        }

        .laptop:hover,
        .notes:hover,
        .photocards:hover,
        .dictionary:hover,
        .disk:hover,
        .cd-player:hover,
        .bunny-cards:hover,

    <script>
        function scaleContent() {
            const scale = Math.min(window.innerWidth / 1440, window.innerHeight / 1024);
            document.querySelector('.home-page').style.transform = `scale(${scale})`;
            document.querySelectorAll('.album-stage, .laptop-stage, .gacha-stage').forEach(stage => {
                stage.style.transform = `scale(${scale})`;
            });
        }
        window.addEventListener('resize', scaleContent);
        scaleContent();

        requestAnimationFrame(() => document.body.classList.add('page-ready'));
        function navigateTo(url) {
            document.body.classList.remove('page-ready');
            setTimeout(() => { window.location.href = url; }, 150);
        }

        const albumOverlay = document.getElementById('albumOverlay');
        const openAlbum = (e) => {
            e.stopPropagation();
            albumOverlay.classList.add('open');
            renderAlbum();
        };
        document.querySelector('.photocards').addEventListener('click', openAlbum);
        document.getElementById('albumExit').addEventListener('click', () => {
            albumOverlay.classList.remove('open');
        });

        const dictionaryOverlay = document.getElementById('dictionaryOverlay');
        const dictionaryFrame = document.getElementById('dictionaryFrame');
        document.querySelector('.dictionary').addEventListener('click', (e) => {
            e.stopPropagation();
            if (!dictionaryFrame.getAttribute('src')) {
                dictionaryFrame.setAttribute('src', 'dictionary.html');
            }
            dictionaryOverlay.classList.add('open');
        });
        document.getElementById('dictionaryClose').addEventListener('click', () => {
            dictionaryOverlay.classList.remove('open');
        });

        const ALBUM_STORAGE_KEY = 'kotoba-bunny-album';
        const FRONT_CAPACITY = 5;
        const REGULAR_CAPACITY = 8;
        const CARD_POOL = [
            ...Array.from({ length: 23 }, (_, i) => `assets/bunny_photocards/bunny_${i + 1}.JPG`),
            ...Array.from({ length: 3 }, (_, i) => `assets/special_pc/special_pc_${i + 1}.JPG`),
        ];
        const preloadedCards = new Map();
        function preloadCard(path) {
            if (preloadedCards.has(path)) return;
            const img = new Image();
            img.src = path;
            preloadedCards.set(path, img);
        }
        CARD_POOL.forEach(preloadCard);
        // Photocard pulls are performed by the React bridge via the rewards
        // service (services/app.ts → rewards.gachaPull). The bridge writes
        // the pulled image path into ALBUM_STORAGE_KEY and reloads the
        // frame; the render logic below just reads that list back.
        let addedCards = [];
        let albumPage = 0;
        try {
            const raw = JSON.parse(localStorage.getItem(ALBUM_STORAGE_KEY)) || [];
            addedCards = raw.map(v =>
                typeof v === 'number' ? `assets/bunny_photocards/bunny_${v}.JPG` : v
            );
        } catch (_) {
            addedCards = [];
        }

        const frontSlotEls = Array.from(document.querySelectorAll('.album-slot.front'));
        const regularSlotEls = Array.from(document.querySelectorAll('.album-slot.regular'));
        const albumPageEl = document.querySelector('.album-page');
        const leftBtn = document.getElementById('albumLeftBtn');
        const rightBtn = document.getElementById('albumRightBtn');

        function saveAlbum() {
            localStorage.setItem(ALBUM_STORAGE_KEY, JSON.stringify(addedCards));
        }

        function totalPages() {
            if (addedCards.length <= FRONT_CAPACITY) return 1;
            return 1 + Math.ceil((addedCards.length - FRONT_CAPACITY) / REGULAR_CAPACITY);
        }

        function pageStartIndex(page) {
            return page === 0 ? 0 : FRONT_CAPACITY + (page - 1) * REGULAR_CAPACITY;
        }

        function pageForCardIndex(cardIdx) {
            if (cardIdx < FRONT_CAPACITY) return 0;
            return 1 + Math.floor((cardIdx - FRONT_CAPACITY) / REGULAR_CAPACITY);
        }

        function renderAlbum() {
            if (albumPage > totalPages() - 1) albumPage = totalPages() - 1;
            if (albumPage < 0) albumPage = 0;

            const isFront = albumPage === 0;
            const activeSlots = isFront ? frontSlotEls : regularSlotEls;
            const inactiveSlots = isFront ? regularSlotEls : frontSlotEls;

            inactiveSlots.forEach(s => {
                s.style.display = 'none';
                s.style.backgroundImage = '';
            });

            const start = pageStartIndex(albumPage);
            activeSlots.forEach((slot, i) => {
                slot.style.display = '';
                const cardPath = addedCards[start + i];
                slot.style.backgroundImage = cardPath ? `url("${cardPath}")` : '';
            });

            if (albumPageEl) albumPageEl.style.display = isFront ? 'none' : '';

            leftBtn.classList.toggle('disabled', albumPage === 0);
            rightBtn.classList.toggle('disabled', albumPage >= totalPages() - 1);
        }

        // #albumAddCard is handled by the React bridge (LegacyDesignFrame)
        // via rewards.gachaPull so the ledger and photocard inventory in
        // Dexie stay authoritative. The bridge's capture-phase listener
        // stops propagation, so no inline click handler is needed here.

        leftBtn.addEventListener('click', () => {
            if (albumPage > 0) { albumPage--; renderAlbum(); }
        });
        rightBtn.addEventListener('click', () => {
            if (albumPage < totalPages() - 1) { albumPage++; renderAlbum(); }
        });

        renderAlbum();

        const homePage = document.querySelector('.home-page');
        document.querySelector('.arrow').addEventListener('click', () => {
            homePage.classList.toggle('menu-open');
        });

        const diskEl = document.querySelector('.disk');
        const DISK_BASE = { left: 872, top: 409, width: 273, height: 240 };
        const CD_BOUNDS = { left: 0, top: 673, width: 306, height: 305 };
        let DISK_INSERT_TX =
            (CD_BOUNDS.left + CD_BOUNDS.width / 2) - (DISK_BASE.left + DISK_BASE.width / 2);
        let DISK_INSERT_TY =
            (CD_BOUNDS.top + CD_BOUNDS.height / 2) - (DISK_BASE.top + DISK_BASE.height / 2);

        // Theme is defined per-theme in CSS but the disk's resting left also
        // shifts with it (878 vs 872), so we mirror that value into DISK_BASE
        // and recompute the snap offset on every theme change.
        const THEME_KEY = 'kotoba-theme';
        const DISK_LEFT_BY_THEME = { bw: 872, color: 878 };
        function applyTheme(t) {
            homePage.classList.toggle('theme-color', t === 'color');
            DISK_BASE.left = DISK_LEFT_BY_THEME[t] ?? DISK_LEFT_BY_THEME.bw;
            DISK_INSERT_TX =
                (CD_BOUNDS.left + CD_BOUNDS.width / 2) - (DISK_BASE.left + DISK_BASE.width / 2);
            DISK_INSERT_TY =
                (CD_BOUNDS.top + CD_BOUNDS.height / 2) - (DISK_BASE.top + DISK_BASE.height / 2);
        }
        applyTheme(localStorage.getItem(THEME_KEY) || 'bw');
        window.addEventListener('message', (e) => {
            if (e.data && e.data.kotoba === 'theme') {
                applyTheme(e.data.value);
            }
        });
        let diskDragging = false;
        let diskMoved = false;
        let diskInserted = false;
        let diskStartClientX = 0;
        let diskStartClientY = 0;
        let diskLastDx = 0;
        let diskLastDy = 0;
        const DRAG_THRESHOLD = 3;

        function currentScale() {
            return Math.min(window.innerWidth / 1440, window.innerHeight / 1024);
        }

        function diskOverlapsCD(tx, ty) {
            const l = DISK_BASE.left + tx;
            const t = DISK_BASE.top + ty;
            const r = l + DISK_BASE.width;
            const b = t + DISK_BASE.height;
            return r > CD_BOUNDS.left
                && l < CD_BOUNDS.left + CD_BOUNDS.width
                && b > CD_BOUNDS.top
                && t < CD_BOUNDS.top + CD_BOUNDS.height;
        }

        diskEl.addEventListener('dragstart', (e) => e.preventDefault());

        diskEl.addEventListener('pointerdown', (e) => {
            diskDragging = true;
            diskMoved = false;
            diskStartClientX = e.clientX;
            diskStartClientY = e.clientY;
            if (diskInserted) {
                diskStartClientX -= DISK_INSERT_TX * currentScale();
                diskStartClientY -= DISK_INSERT_TY * currentScale();
                diskLastDx = DISK_INSERT_TX;
                diskLastDy = DISK_INSERT_TY;
            } else {
                diskLastDx = 0;
                diskLastDy = 0;
            }
            diskEl.classList.remove('snapping');
            diskEl.classList.add('dragging');
            diskEl.setPointerCapture(e.pointerId);
        });

        diskEl.addEventListener('pointermove', (e) => {
            if (!diskDragging) return;
            const scale = currentScale() || 1;
            const dx = (e.clientX - diskStartClientX) / scale;
            const dy = (e.clientY - diskStartClientY) / scale;
            diskLastDx = dx;
            diskLastDy = dy;
            if (Math.hypot(dx, dy) > DRAG_THRESHOLD) diskMoved = true;
            diskEl.style.transform = `translate(${dx}px, ${dy}px)`;
            diskEl.classList.toggle('behind-cd', diskOverlapsCD(dx, dy));
        });

        function endDiskDrag(e) {
            if (!diskDragging) return;
            diskDragging = false;
            diskEl.classList.remove('dragging');
            const overlaps = diskOverlapsCD(diskLastDx, diskLastDy);
            diskEl.classList.add('snapping');
            if (overlaps) {
                diskInserted = true;
                diskEl.classList.add('behind-cd');
                diskEl.style.transform = `translate(${DISK_INSERT_TX}px, ${DISK_INSERT_TY}px)`;
                homePage.classList.add('disk-inserted');
            } else {
                diskInserted = false;
                diskEl.classList.remove('behind-cd');
                diskEl.style.transform = 'translate(0, 0)';
                homePage.classList.remove('disk-inserted');
            }
            if (e && diskEl.hasPointerCapture?.(e.pointerId)) {
                diskEl.releasePointerCapture(e.pointerId);
            }
        }
        diskEl.addEventListener('pointerup', endDiskDrag);
        diskEl.addEventListener('pointercancel', endDiskDrag);

        diskEl.addEventListener('click', (e) => {
            if (diskMoved) {
                e.stopImmediatePropagation();
                e.preventDefault();
                return;
            }
            localStorage.setItem('kotoba-visited', '1');
            navigateTo('disk-select.html');
        });

        document.querySelector('.cds').addEventListener('click', () => {
            navigateTo('disk-select.html');
        });

        const settingsOverlay = document.getElementById('settingsOverlay');
        const settingsFrame = document.getElementById('settingsFrame');
        document.querySelector('.settings').addEventListener('click', (e) => {
            e.stopPropagation();
            if (!settingsFrame.getAttribute('src')) {
                settingsFrame.setAttribute('src', 'settings.html');
            }
            settingsOverlay.classList.add('open');
        });
        document.getElementById('settingsClose').addEventListener('click', () => {
            settingsOverlay.classList.remove('open');
        });

        function ejectDisk() {
            if (!diskInserted) return;
            diskInserted = false;
            homePage.classList.remove('disk-inserted');
            diskEl.classList.add('snapping');
            diskEl.style.transform = `translate(${DISK_INSERT_TX}px, 580px)`;
            setTimeout(() => {
                diskEl.classList.remove('behind-cd');
                diskEl.style.transform = 'translate(0, 0)';
            }, 400);
        }
        document.querySelector('.cd-player').addEventListener('click', ejectDisk);

        const laptopOverlay = document.getElementById('laptopOverlay');
        const laptopStage = laptopOverlay.querySelector('.laptop-stage');
        const urlInput = document.getElementById('urlInput');
        let musicPhaseTimer = null;

        function openLaptopPopup() {
            laptopStage.classList.remove('phase-burn', 'phase-eject', 'show-error');
            laptopStage.classList.add('phase-music');
            urlInput.value = '';
            laptopOverlay.classList.add('open');
            clearTimeout(musicPhaseTimer);
            musicPhaseTimer = setTimeout(() => {
                laptopStage.classList.remove('phase-music');
                laptopStage.classList.add('phase-burn');
                urlInput.focus();
            }, 1000);
        }

        function closeLaptopPopup() {
            clearTimeout(musicPhaseTimer);
            laptopOverlay.classList.remove('open');
            urlInput.blur();
        }

        document.querySelector('.laptop').addEventListener('click', () => {
            if (!diskInserted) return;
            openLaptopPopup();
        });

        laptopOverlay.addEventListener('click', (e) => {
            if (e.target === laptopOverlay) closeLaptopPopup();
        });

        urlInput.addEventListener('input', () => {
            laptopStage.classList.remove('show-error');
        });

        urlInput.addEventListener('keydown', (e) => {
            if (e.key !== 'Enter') return;
            e.preventDefault();
            const v = urlInput.value;
            if (v === 'error') {
                laptopStage.classList.add('show-error');
            } else if (v === 'exit') {
                laptopStage.classList.remove('phase-burn', 'show-error');
                laptopStage.classList.add('phase-eject');
                urlInput.blur();
            }
        });

        document.getElementById('ejectYes').addEventListener('click', () => {
            ejectDisk();
            closeLaptopPopup();
        });

        document.getElementById('ejectNo').addEventListener('click', () => {
            closeLaptopPopup();
        });

        if (window.location.search.includes('reset')) {
            localStorage.removeItem('kotoba-visited');
        }

        if (!localStorage.getItem('kotoba-visited')) {
            homePage.classList.add('first-visit');
        }

        const POINTS_KEY = 'kotoba-points';
        const pointsDigitEls = Array.from(document.querySelectorAll('.points-digit'));
        const gachaDigitEls = Array.from(document.querySelectorAll('.gacha-digit'));
        const pointsMax = 10 ** pointsDigitEls.length;
        const WISH_COST = 100;
        let pointsValue = parseInt(localStorage.getItem(POINTS_KEY), 10);
        if (!Number.isFinite(pointsValue) || pointsValue < 0) pointsValue = 0;

        function fillDigitGroup(els) {
            const len = els.length;
            if (!len) return;
            const str = String(pointsValue).padStart(len, '0').slice(-len);
            const firstNonZero = str.search(/[^0]/);
            els.forEach((el, i) => {
                const show = firstNonZero === -1 ? i === len - 1 : i >= firstNonZero;
                el.style.backgroundImage = show ? `url("assets/home/pointboard/${str[i]}.png")` : 'none';
            });
        }

        function renderPoints() {
            fillDigitGroup(pointsDigitEls);
            fillDigitGroup(gachaDigitEls);
            const wishBtn = document.getElementById('gachaWish');
            if (wishBtn) wishBtn.disabled = pointsValue < WISH_COST;
        }

        document.getElementById('pointsIncrement').addEventListener('click', () => {
            pointsValue = (pointsValue + 100) % pointsMax;
            localStorage.setItem(POINTS_KEY, String(pointsValue));
            renderPoints();
        });

        document.getElementById('pointsReset').addEventListener('click', () => {
            pointsValue = 0;
            localStorage.setItem(POINTS_KEY, '0');
            renderPoints();
        });

        renderPoints();

        const gachaOverlay = document.getElementById('gachaOverlay');
        const gachaStage = gachaOverlay.querySelector('.gacha-stage');
        const gachaCardReveal = gachaOverlay.querySelector('.gacha-card-reveal');
        const gachaWishBtn = document.getElementById('gachaWish');
        const gachaExitBtn = document.getElementById('gachaExit');

        function openGacha() {
            gachaStage.classList.remove('revealed');
            gachaCardReveal.style.backgroundImage = '';
            renderPoints();
            gachaOverlay.classList.add('open');
        }
        function closeGacha() {
            gachaOverlay.classList.remove('open');
        }
        function pullGachaCard() {
            if (pointsValue < WISH_COST) return;
            pointsValue -= WISH_COST;
            localStorage.setItem(POINTS_KEY, String(pointsValue));
            const card = CARD_POOL[Math.floor(Math.random() * CARD_POOL.length)];
            addedCards.push(card);
            saveAlbum();
            gachaCardReveal.style.backgroundImage = `url("${card}")`;
            gachaStage.classList.remove('revealed');
            void gachaStage.offsetWidth;
            gachaStage.classList.add('revealed');
            renderPoints();
        }

        document.querySelector('.bunny-cards').addEventListener('click', openGacha);
        gachaWishBtn.addEventListener('click', pullGachaCard);
        gachaExitBtn.addEventListener('click', closeGacha);
        gachaOverlay.addEventListener('click', (e) => {
            if (e.target === gachaOverlay) closeGacha();
        });

        const NOTES_STORAGE_KEY = 'kotoba-notes';
        const notesOverlay = document.getElementById('notesOverlay');
        const notesListEl = document.getElementById('notesList');
        const notesTitleEl = document.getElementById('notesTitle');
        const notesSubtitleEl = document.getElementById('notesSubtitle');
        const notesContentEl = document.getElementById('notesContent');
        const notesDateEl = document.getElementById('notesDate');
        const notesDeleteBtn = document.getElementById('notesDelete');
        const notesNewBtn = document.getElementById('notesNew');
        const notesCloseBtn = document.getElementById('notesClose');

        let notes = [];
        let activeNoteId = null;
        let notesSaveTimer = null;

        try {
            notes = JSON.parse(localStorage.getItem(NOTES_STORAGE_KEY)) || [];
        } catch (_) { notes = []; }

        function isEmptyNote(n) {
            return !(n.title || '').trim()
                && !(n.subtitle || '').trim()
                && !(n.content || '').trim();
        }
        function pruneEmptyNotes(exceptId) {
            notes = notes.filter(n => !isEmptyNote(n) || n.id === exceptId);
        }
        function saveNotes() {
            const toSave = notes.filter(n => !isEmptyNote(n));
            localStorage.setItem(NOTES_STORAGE_KEY, JSON.stringify(toSave));
        }
        function formatNoteDate(ts) {
            const d = new Date(ts);
            const now = new Date();
            const sameDay = d.toDateString() === now.toDateString();
            if (sameDay) return d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
            return d.toLocaleDateString();
        }
        function noteTitleText(n) {
            const t = (n.title || '').trim();
            if (t) return t;
            const firstLine = (n.content || '').split('\n')[0].trim();
            return firstLine || 'New Note';
        }
        function notePreviewText(n) {
            const s = (n.subtitle || '').trim();
            if (s) return s;
            const titleSet = !!(n.title || '').trim();
            const lines = (n.content || '').split('\n');
            const startIdx = titleSet ? 0 : 1;
            for (let i = startIdx; i < lines.length; i++) {
                const t = lines[i].trim();
                if (t) return t;
            }
            return 'No additional text';
        }
        function renderNotesList() {
            notesListEl.innerHTML = '';
            notes.forEach(n => {
                const li = document.createElement('li');
                if (n.id === activeNoteId) li.classList.add('active');
                const title = document.createElement('div');
                title.className = 'note-title';
                title.textContent = noteTitleText(n);
                const meta = document.createElement('div');
                meta.className = 'note-meta';
                const date = document.createElement('span');
                date.textContent = formatNoteDate(n.updated);
                const preview = document.createElement('span');
                preview.className = 'note-preview';
                preview.textContent = notePreviewText(n);
                meta.appendChild(date);
                meta.appendChild(preview);
                li.appendChild(title);
                li.appendChild(meta);
                li.addEventListener('click', () => selectNote(n.id));
                notesListEl.appendChild(li);
            });
        }
        function renderNotesEditor() {
            const n = notes.find(x => x.id === activeNoteId);
            const disabled = !n;
            [notesTitleEl, notesSubtitleEl, notesContentEl].forEach(el => el.disabled = disabled);
            if (!n) {
                notesTitleEl.value = '';
                notesSubtitleEl.value = '';
                notesContentEl.value = '';
                notesDateEl.textContent = '';
                notesDeleteBtn.style.visibility = 'hidden';
                return;
            }
            if (notesTitleEl.value !== (n.title || '')) notesTitleEl.value = n.title || '';
            if (notesSubtitleEl.value !== (n.subtitle || '')) notesSubtitleEl.value = n.subtitle || '';
            if (notesContentEl.value !== (n.content || '')) notesContentEl.value = n.content || '';
            notesDateEl.textContent = formatNoteDate(n.updated);
            notesDeleteBtn.style.visibility = 'visible';
        }
        function selectNote(id) {
            pruneEmptyNotes(id);
            activeNoteId = id;
            saveNotes();
            renderNotesList();
            renderNotesEditor();
        }
        function createNote() {
            pruneEmptyNotes();
            const n = {
                id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
                title: '',
                subtitle: '',
                content: '',
                updated: Date.now()
            };
            notes.unshift(n);
            activeNoteId = n.id;
            renderNotesList();
            renderNotesEditor();
            notesTitleEl.focus();
        }
        function deleteActiveNote() {
            const idx = notes.findIndex(x => x.id === activeNoteId);
            if (idx < 0) return;
            notes.splice(idx, 1);
            activeNoteId = notes[0] ? notes[0].id : null;
            saveNotes();
            renderNotesList();
            renderNotesEditor();
        }
        function handleNoteInput() {
            const n = notes.find(x => x.id === activeNoteId);
            if (!n) return;
            n.title = notesTitleEl.value;
            n.subtitle = notesSubtitleEl.value;
            n.content = notesContentEl.value;
            n.updated = Date.now();
            const idx = notes.indexOf(n);
            if (idx > 0) { notes.splice(idx, 1); notes.unshift(n); }
            clearTimeout(notesSaveTimer);
            notesSaveTimer = setTimeout(() => {
                saveNotes();
                renderNotesList();
            }, 300);
        }
        [notesTitleEl, notesSubtitleEl, notesContentEl].forEach(el => {
            el.addEventListener('input', handleNoteInput);
        });
        function closeNotesOverlay() {
            clearTimeout(notesSaveTimer);
            pruneEmptyNotes();
            if (!notes.find(x => x.id === activeNoteId)) {
                activeNoteId = notes[0] ? notes[0].id : null;
            }
            saveNotes();
            renderNotesList();
            notesOverlay.classList.remove('open');
        }
        notesNewBtn.addEventListener('click', createNote);
        notesDeleteBtn.addEventListener('click', deleteActiveNote);
        notesCloseBtn.addEventListener('click', closeNotesOverlay);
        notesOverlay.addEventListener('click', (e) => {
            if (e.target === notesOverlay) closeNotesOverlay();
        });
        document.querySelector('.notes').addEventListener('click', () => {
            if (activeNoteId && !notes.find(x => x.id === activeNoteId)) activeNoteId = null;
            if (!activeNoteId && notes.length > 0) activeNoteId = notes[0].id;
            renderNotesList();
            renderNotesEditor();
            notesOverlay.classList.add('open');
            if (activeNoteId) {
                setTimeout(() => notesTitleEl.focus(), 50);
            }
        });

    </script>
</body>
</html>
