<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kotoba - Diskbox</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background: #FFFFFF;
        }

        body {
            opacity: 0;
            transition: opacity 0.35s ease;
        }

        body.page-ready {
            opacity: 1;
        }

        .viewport {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .desktop-1 {
            position: relative;
            width: 1440px;
            height: 1024px;
            background: #FFFFFF;
            transform-origin: center center;
            flex-shrink: 0;
        }

        .desktop-1 > div {
            background-repeat: no-repeat;
            background-size: contain;
            user-select: none;
            -webkit-user-drag: none;
        }

        .box-back {
            position: absolute;
            width: 1440px;
            height: 933px;
            left: 0px;
            bottom: 0px;
            background-image: url("assets/diskbox/box back.png");
            filter: drop-shadow(0px 4px 4px rgba(0, 0, 0, 0.25));
        }

        .bg-disks {
            position: absolute;
            width: 1440px;
            height: 933px;
            left: 0px;
            bottom: 0px;
            background-image: url("assets/diskbox/bg disks.png");
        }

        .pick-disk {
            position: absolute;
            width: 1440px;
            height: 933px;
            left: 0px;
            bottom: 0px;
            background-image: url("assets/diskbox/pick disk.png");
        }

        .box-top {
            position: absolute;
            width: 1440px;
            height: 933px;
            left: calc(50% - 1440px/2);
            bottom: 0px;
            background-image: url("assets/diskbox/box top.png");
        }

        .pick-disk {
            cursor: pointer;
        }

        .box-top,
        .box-back,
        .bg-disks {
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="viewport">
    <div class="desktop-1">
        <div class="box-back"></div>
        <div class="bg-disks"></div>
        <div class="pick-disk"></div>
        <div class="box-top"></div>
    </div>
    </div>
    <script>
        function scaleContent() {
            const scale = Math.min(window.innerWidth / 1440, window.innerHeight / 1024);
            document.querySelector('.desktop-1').style.transform = `scale(${scale})`;
        }
        window.addEventListener('resize', scaleContent);
        scaleContent();

        requestAnimationFrame(() => document.body.classList.add('page-ready'));
        function navigateTo(url) {
            document.body.classList.remove('page-ready');
            setTimeout(() => { window.location.href = url; }, 350);
        }

        document.querySelector('.pick-disk').addEventListener('click', () => {
            navigateTo('disk-select.html');
        });
    </script>
</body>
</html>
