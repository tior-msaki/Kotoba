<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kotoba - Settings</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background: #FFFFFF;
        }

        body {
            opacity: 0;
            transition: opacity 0.35s ease;
        }

        body.page-ready {
            opacity: 1;
        }

        .viewport {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .settings-page {
            position: relative;
            width: 1440px;
            height: 1024px;
            background: #FFFFFF;
            transform-origin: center center;
            flex-shrink: 0;
        }

        .settings-page > div {
            background-repeat: no-repeat;
            background-size: contain;
            user-select: none;
            -webkit-user-drag: none;
        }

        .settings-title {
            position: absolute;
            width: 875px;
            height: 63px;
            left: calc(50% - 875px/2);
            top: 155px;
            font-family: 'Gamja Flower', cursive;
            font-style: normal;
            font-weight: 400;
            font-size: 50px;
            line-height: 62px;
            color: #000000;
            text-align: center;
        }

        .settings-close {
            position: absolute;
            top: 20px;
            right: 24px;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: #e8e0d0;
            border: none;
            color: #222;
            font-family: Georgia, serif;
            font-size: 22px;
            line-height: 1;
            cursor: pointer;
            box-shadow: 1px 2px 6px rgba(0, 0, 0, 0.4);
            z-index: 2;
        }

        .settings-close:hover {
            background: #d8cfc0;
        }

        /* Erase-all row. Styling mirrors the Forum-font ghost buttons used
           elsewhere on the site (.points-increment, .album-add-card):
           flat, underlined, black, no fill. */
        .erase-row {
            position: absolute;
            left: calc(50% - 500px/2);
            top: 460px;
            width: 500px;
            text-align: center;
        }

        .erase-btn {
            font-family: 'Forum', serif;
            font-style: normal;
            font-weight: 400;
            font-size: 32px;
            line-height: 1;
            text-decoration: underline;
            color: #000000;
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
        }

        .erase-btn:hover {
            opacity: 0.7;
        }

        .erase-prompt,
        .erase-status {
            font-family: 'Gamja Flower', cursive;
            font-size: 28px;
            line-height: 1.25;
            color: #000000;
            margin-top: 12px;
        }

        .erase-prompt-choices {
            margin-top: 10px;
            display: flex;
            justify-content: center;
            gap: 28px;
        }

        .erase-choice {
            font-family: 'Forum', serif;
            font-size: 26px;
            line-height: 1;
            text-decoration: underline;
            color: #000000;
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
        }

        .erase-choice:hover {
            opacity: 0.7;
        }

        .erase-choice:disabled {
            opacity: 0.4;
            cursor: wait;
        }

        .hidden {
            display: none;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Forum&family=Gamja+Flower&display=swap" rel="stylesheet">
</head>
<body>
    <button class="settings-close" id="settingsClose" aria-label="Close settings">×</button>
    <div class="viewport">
        <div class="settings-page">
            <div class="settings-title">settings</div>
            <div class="erase-row">
                <button class="erase-btn" id="eraseBtn" type="button">erase all data</button>
                <div class="erase-prompt hidden" id="erasePrompt">
                    this clears all playlists, dictionary entries,<br>
                    notes, photocards &amp; points. can't be undone.
                    <div class="erase-prompt-choices">
                        <button class="erase-choice" id="eraseYes" type="button">yes, erase</button>
                        <button class="erase-choice" id="eraseNo" type="button">cancel</button>
                    </div>
                </div>
                <div class="erase-status hidden" id="eraseStatus"></div>
            </div>
        </div>
    </div>
    <script>
        function scaleContent() {
            const scale = Math.min(window.innerWidth / 1440, window.innerHeight / 1024);
            document.querySelector('.settings-page').style.transform = `scale(${scale})`;
        }
        window.addEventListener('resize', scaleContent);
        scaleContent();

        requestAnimationFrame(() => document.body.classList.add('page-ready'));
        function navigateTo(url) {
            document.body.classList.remove('page-ready');
            setTimeout(() => { window.location.href = url; }, 350);
        }

        document.getElementById('settingsClose').addEventListener('click', () => {
            navigateTo('home.html');
        });

        // ---- Erase all data ------------------------------------------------
        // Source of truth on what gets cleared:
        //   - Dexie DB "KotobaDB" — every object store is .clear()ed. We
        //     enumerate stores from the live DB rather than hard-coding the
        //     schema so future tables are also cleared.
        //   - localStorage keys owned by the legacy-HTML / React-bridge layer
        //     (see src/frontend/LegacyDesignFrame.tsx), disk-select.html's
        //     carousel selection, home.html's legacy inline notes store,
        //     and every per-slot record written by slotMemory.ts (prefix).
        const LS_KEYS = [
            'kotoba-bunny-album',
            'kotoba-points',
            'kotoba-cd-state',
            'kotoba-burned-playlist',
            'kotoba-spotify-bearer-token',
            'kotoba-visited',
            // Last-committed carousel position (disk-select.html).
            'kotoba-current-playlist-slot',
            // Legacy inline notes store still written by home.html.
            'kotoba-notes',
        ];

        // Prefix of the per (playlistSlot, cdSlot) records written by
        // src/domains/playlist/slotMemory.ts. Cleared via prefix scan
        // below because the key set is variable — one per saved slot.
        // Without this, burned CDs silently re-hydrate after a reload
        // even though the user clicked "erase all data".
        const SLOT_KEY_PREFIX = 'kotoba-slot-v1:';

        function clearDexieStores() {
            return new Promise((resolve, reject) => {
                let req;
                try {
                    req = indexedDB.open('KotobaDB');
                } catch (err) {
                    reject(err);
                    return;
                }
                req.onerror = () => reject(req.error || new Error('open failed'));
                req.onsuccess = () => {
                    const db = req.result;
                    const storeNames = Array.from(db.objectStoreNames);
                    if (storeNames.length === 0) {
                        db.close();
                        resolve();
                        return;
                    }
                    let tx;
                    try {
                        tx = db.transaction(storeNames, 'readwrite');
                    } catch (err) {
                        db.close();
                        reject(err);
                        return;
                    }
                    storeNames.forEach((n) => {
                        try { tx.objectStore(n).clear(); } catch (_) { /* noop */ }
                    });
                    tx.oncomplete = () => { db.close(); resolve(); };
                    tx.onerror = () => { db.close(); reject(tx.error); };
                    tx.onabort = () => { db.close(); reject(tx.error || new Error('aborted')); };
                };
            });
        }

        function clearLocalStorageKeys() {
            LS_KEYS.forEach((k) => {
                try { localStorage.removeItem(k); } catch (_) { /* noop */ }
            });
            clearLocalStorageSlotMemory();
        }

        // Remove every per-slot record (kotoba-slot-v1:*). Two-pass so we
        // don't mutate localStorage while iterating by index.
        function clearLocalStorageSlotMemory() {
            let toRemove;
            try {
                toRemove = [];
                for (let i = 0; i < localStorage.length; i++) {
                    const k = localStorage.key(i);
                    if (typeof k === 'string' && k.indexOf(SLOT_KEY_PREFIX) === 0) {
                        toRemove.push(k);
                    }
                }
            } catch (_) { return; }
            for (let j = 0; j < toRemove.length; j++) {
                try { localStorage.removeItem(toRemove[j]); } catch (_) { /* noop */ }
            }
        }

        const eraseBtn = document.getElementById('eraseBtn');
        const erasePrompt = document.getElementById('erasePrompt');
        const eraseStatus = document.getElementById('eraseStatus');
        const eraseYes = document.getElementById('eraseYes');
        const eraseNo = document.getElementById('eraseNo');

        eraseBtn.addEventListener('click', () => {
            eraseBtn.classList.add('hidden');
            eraseStatus.classList.add('hidden');
            eraseStatus.textContent = '';
            erasePrompt.classList.remove('hidden');
        });

        eraseNo.addEventListener('click', () => {
            erasePrompt.classList.add('hidden');
            eraseBtn.classList.remove('hidden');
        });

        eraseYes.addEventListener('click', async () => {
            eraseYes.disabled = true;
            eraseNo.disabled = true;
            try {
                await clearDexieStores();
                clearLocalStorageKeys();
                erasePrompt.classList.add('hidden');
                eraseStatus.textContent = 'all data cleared.';
                eraseStatus.classList.remove('hidden');
            } catch (err) {
                erasePrompt.classList.add('hidden');
                eraseStatus.textContent = "couldn't erase data. please try again.";
                eraseStatus.classList.remove('hidden');
                eraseBtn.classList.remove('hidden');
            } finally {
                eraseYes.disabled = false;
                eraseNo.disabled = false;
            }
        });
    </script>
</body>
</html>
