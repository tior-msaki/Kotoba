<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>和英辞典</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Linux+Libertine:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #555;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 24px 16px 32px;
  gap: 20px;
  font-family: 'Linux Libertine', 'Times New Roman', serif;
}

/* ── Navigation ── */
#nav {
  display: flex;
  align-items: center;
  gap: 16px;
  user-select: none;
}

.nav-btn {
  background: #e8e0d0;
  border: none;
  border-radius: 4px;
  padding: 7px 22px;
  font-size: 13px;
  font-family: Georgia, serif;
  font-style: italic;
  color: #222;
  cursor: pointer;
  box-shadow: 1px 2px 5px rgba(0,0,0,0.35);
  transition: background 0.15s;
}
.nav-btn:hover { background: #d8cfc0; }
.nav-btn:disabled { opacity: 0.35; cursor: default; background: #e8e0d0; }

#indicator {
  color: #e8e0d0;
  font-size: 12px;
  font-style: italic;
  font-family: Georgia, serif;
  min-width: 90px;
  text-align: center;
  letter-spacing: 0.03em;
}

/* ══════════════════════════════════════════
   BOOK WRAP — outer container
   Wide: column layout, tabs sit on top edge
   Narrow: row layout, tabs on left or right side
══════════════════════════════════════════ */
#book-wrap {
  max-width: 700px;
  width: 100%;
  display: flex;
  flex-direction: column;   /* tabs above book by default */
  align-items: stretch;
  position: relative;
}

/* ── TOP TABS (wide screens) ── */
#tabs-top {
  display: flex;
  flex-direction: row;
  align-items: flex-end;
  gap: 3px;
  padding: 0 2px 0 2px;
  user-select: none;
  position: relative;
  z-index: 3;
  /* sits flush against the book top */
  margin-bottom: -1px;
}

.tab-group {
  display: flex;
  flex-direction: row;
  gap: 2px;
  align-items: flex-end;
  /* Small gap between groups */
  margin-right: 6px;
}
.tab-group:last-child { margin-right: 0; }

/* ── SIDE TABS (narrow screens) ── */
#tabs-side {
  display: none;   /* hidden by default, shown on narrow */
  flex-direction: column;
  gap: 3px;
  align-items: flex-start;
  user-select: none;
  position: absolute;
  top: 0;
  z-index: 3;
}
#tabs-side.side-left  { left: -34px; align-items: flex-end; }
#tabs-side.side-right { right: -34px; align-items: flex-start; }

/* ── SHARED TAB BUTTON ── */
.tab {
  background: #b5a898;
  color: #2a1f14;
  border: 1px solid #8a7060;
  font-size: 13px;
  font-family: 'Noto Serif JP', 'Times New Roman', serif;
  font-weight: 700;
  cursor: pointer;
  line-height: 1;
  transition: background 0.12s;
  white-space: nowrap;
  user-select: none;
}
.tab:hover { background: #cfc0b0; color: #1a0f06; }
.tab.active {
  background: #fdf8f2;
  color: #1a0f06;
  border-color: #8a7a68;
  z-index: 4;
}

/* Top-tab shape: rounded top, no bottom border, bleeds into book */
.tab-top {
  border-bottom: none;
  border-radius: 5px 5px 0 0;
  padding: 4px 8px 3px;
  box-shadow: 0 -1px 4px rgba(0,0,0,0.2);
  position: relative;
  bottom: -1px;
}
.tab-top.active {
  border-bottom-color: #fdf8f2;
  box-shadow: 0 -2px 6px rgba(0,0,0,0.15);
}

/* Side-tab shape: rounded outside edge, no inner border, bleeds into book */
.tab-side-left {
  border-right: none;
  border-radius: 5px 0 0 5px;
  padding: 5px 6px 5px 7px;
  box-shadow: -2px 0 4px rgba(0,0,0,0.18);
  position: relative;
  right: -1px;
}
.tab-side-left.active {
  border-right-color: #fdf8f2;
  box-shadow: -2px 0 6px rgba(0,0,0,0.15);
}
.tab-side-right {
  border-left: none;
  border-radius: 0 5px 5px 0;
  padding: 5px 7px 5px 6px;
  box-shadow: 2px 0 4px rgba(0,0,0,0.18);
  position: relative;
  left: -1px;
}
.tab-side-right.active {
  border-left-color: #fdf8f2;
}

/* ── BOOK SPREAD ── */
#spread-wrap {
  display: flex;
  flex-direction: row;
  align-items: stretch;
  position: relative;
}

#spread {
  display: flex;
  gap: 0;
  box-shadow: 3px 5px 22px rgba(0,0,0,0.55);
  width: 100%;
  border: 1px solid #8a7a68;
  position: relative;
  z-index: 1;
  aspect-ratio: 6 / 5;
}

/* ── SINGLE PAGE ── */
.page {
  background: #fdf8f2;
  color: #000;
  width: 50%;
  flex-shrink: 0;
  height: 100%;
  display: flex;
  flex-direction: column;
  border: none;
  overflow: hidden;
}
.page.left  { border-right: 1px solid #8a7a68; }

/* ── NARROW: side tabs ── */
@media (max-width: 560px) {
  #tabs-top  { display: none; }
  #tabs-side { display: flex; }
  body { padding-left: 44px; padding-right: 44px; }
}




/* ── Page header ── */
.page-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  border-bottom: 1.5px solid #000;
  padding: 3px 7px 2px 7px;
  flex-shrink: 0;
  background: #fdf8f2;
}

.hw-range {
  font-size: 6.5pt;
  font-weight: bold;
  font-style: italic;
}
.pg { font-size: 6.5pt; }

/* ── Two-column grid inside a page ── */
.cols {
  display: grid;
  grid-template-columns: 1fr 1fr;
  flex: 1;
  min-height: 0;
  overflow: hidden;
}

.col {
  padding: 2px 4px 2px 5px;
  overflow: hidden;
}
.col:first-child { border-right: 0.75px solid #000; }

/* ── Section kana header ── */
.sec {
  font-size: 6.5pt;
  font-weight: bold;
  border-bottom: 0.5px solid #000;
  margin: 3px 0 1.5px 0;
  line-height: 1.1;
  padding-bottom: 0.5px;
}

/* ── Entry ── */
.e {
  font-size: 5.7pt;
  line-height: 1.3;
  margin-bottom: 1.5px;
  text-indent: -7px;
  padding-left: 7px;
}

.hw {
  font-weight: bold;
  font-size: 6.2pt;
  font-family: 'Noto Serif JP', 'Times New Roman', serif;
}

ruby { font-family: 'Noto Serif JP', 'Times New Roman', serif; }
rt {
  font-size: 3.8pt;
  font-weight: 400;
  letter-spacing: 0;
  line-height: 1.1;
}

.rom { font-style: italic; font-weight: normal; font-size: 5.5pt; }
.pos { font-style: italic; font-size: 5.2pt; }
.df  { font-size: 5.7pt; }
.xr  { font-style: italic; font-size: 5.2pt; }
.sn  { font-weight: bold; font-size: 5.2pt; }

.note {
  border: 0.5px solid #000;
  padding: 2px 2.5px;
  margin: 2px 0;
  font-size: 5.1pt;
  line-height: 1.3;
}
.note-lbl {
  font-weight: bold;
  font-size: 4.9pt;
  letter-spacing: 0.05em;
}

/* ── Responsive: narrow → single page ── */
@media (max-width: 480px) {
  #spread { max-width: 340px; }
  #spread .page.hidden-narrow { display: none; }
}
</style>
</head>
<body>

<div id="nav">
  <button class="nav-btn" id="btn-prev" onclick="turn(-1)">← Back</button>
  <span id="indicator"></span>
  <button class="nav-btn" id="btn-next" onclick="turn(1)">Next →</button>
</div>

<div id="book-wrap">
  <div id="tabs-top"></div>
  <div id="spread-wrap">
    <div id="tabs-side"></div>
    <div id="spread"></div>
  </div>
</div>

/* ═══════════════════════════════════════════════
   TAB DATA — one entry per page, 5 letters each
   spreadIndex: which two-page spread to show
   On wide screens: all tabs along top edge.
   On narrow screens: tabs for the current spread
     on the left (odd spread) or right (even spread) side.
═══════════════════════════════════════════════ */
const TOTAL_PAGES   = PAGES.length;
const TOTAL_SPREADS = Math.ceil(TOTAL_PAGES / 2);
let spreadIndex = 0;

/* ── Build top tabs (wide) ── */
(function buildTopTabs() {
  const bar = document.getElementById('tabs-top');
  PAGES.forEach((p, pageIdx) => {
    const grp = document.createElement('div');
    grp.className = 'tab-group';
    p.letters.forEach(kana => {
      const btn = document.createElement('button');
      btn.className = 'tab tab-top';
      btn.dataset.page = pageIdx;
      btn.dataset.spread = Math.floor(pageIdx / 2);
      btn.textContent = kana;
      btn.onclick = () => { spreadIndex = Math.floor(pageIdx / 2); render(); };
      grp.appendChild(btn);
    });
    bar.appendChild(grp);
  });
})();

/* ── Build side tabs (narrow) — rebuilt on each render ── */
function buildSideTabs() {
  const side = document.getElementById('tabs-side');
  side.innerHTML = '';
  /* Show tabs for the current spread's page(s) only */
  const pageIdxs = [spreadIndex * 2, spreadIndex * 2 + 1].filter(i => PAGES[i]);
  /* Side: right side for odd spreads, left for even — just pick one consistent side */
  const onRight = spreadIndex % 2 === 0;
  side.className = onRight ? 'side-right' : 'side-left';
  const shapeClass = onRight ? 'tab-side-right' : 'tab-side-left';

  /* Gather all letters across both pages of the spread */
  pageIdxs.forEach(pageIdx => {
    PAGES[pageIdx].letters.forEach(kana => {
      const btn = document.createElement('button');
      btn.className = `tab ${shapeClass}`;
      btn.dataset.page = pageIdx;
      btn.dataset.spread = spreadIndex;
      btn.textContent = kana;
      btn.onclick = () => { render(); };   /* already on this spread */
      side.appendChild(btn);
    });
  });
  /* Mark all as active since we only show current spread's tabs */
  side.querySelectorAll('.tab').forEach(b => b.classList.add('active'));
}

function buildPage(pageData, side) {
  return `<div class="page ${side}">
    <div class="page-header">
      <span class="hw-range">${pageData.range}</span>
      <span class="pg">${pageData.pg}</span>
    </div>
    <div class="cols">
      <div class="col">${pageData.col1}</div>
      <div class="col">${pageData.col2}</div>
    </div>
  </div>`;
}

function render() {
  const spread   = document.getElementById('spread');
  const leftIdx  = spreadIndex * 2;
  const rightIdx = leftIdx + 1;
  const narrow   = window.matchMedia('(max-width: 560px)').matches;

  /* Pages */
  let html = '';
  if (PAGES[leftIdx])             html += buildPage(PAGES[leftIdx],  'left');
  if (!narrow && PAGES[rightIdx]) html += buildPage(PAGES[rightIdx], 'right');
  spread.classList.toggle('two-pages', !narrow && !!PAGES[rightIdx]);
  spread.innerHTML = html;

  /* Indicator */
  const indicator = document.getElementById('indicator');
  if (!narrow && PAGES[rightIdx]) {
    indicator.textContent = `pp. ${leftIdx+1}–${rightIdx+1} of ${TOTAL_PAGES}`;
  } else {
    indicator.textContent = `p. ${leftIdx+1} of ${TOTAL_PAGES}`;
  }

  /* Nav buttons */
  document.getElementById('btn-prev').disabled = spreadIndex === 0;
  document.getElementById('btn-next').disabled = spreadIndex >= TOTAL_SPREADS - 1;

  /* Top tabs: highlight active spread's group */
  document.querySelectorAll('#tabs-top .tab').forEach(btn => {
    btn.classList.toggle('active', +btn.dataset.spread === spreadIndex);
  });

  /* Side tabs: rebuild for current spread */
  buildSideTabs();
}

function turn(dir) {
  spreadIndex = Math.max(0, Math.min(TOTAL_SPREADS - 1, spreadIndex + dir));
  render();
}

window.addEventListener('resize', render);
render();
</script>
