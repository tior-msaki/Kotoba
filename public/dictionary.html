<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>和英辞典</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Linux+Libertine:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: transparent;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 16px 90px 20px;
  gap: 12px;
  font-family: 'Linux Libertine', 'Times New Roman', serif;
}

/* ── Navigation ── */
#nav {
  display: flex;
  align-items: center;
  justify-content: center;
  user-select: none;
}

.nav-btn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 56px;
  height: 56px;
  background: transparent no-repeat center/contain;
  border: none;
  padding: 0;
  cursor: pointer;
  transition: opacity 0.15s;
  z-index: 5;
}
.nav-btn:hover { opacity: 0.8; }
.nav-btn:disabled { opacity: 0.35; cursor: default; }

#btn-prev {
  background-image: url("assets/disk%20select/left%20arrow.png");
  left: -76px;
}
#btn-next {
  background-image: url("assets/disk%20select/right%20arrow.png");
  right: -76px;
}

#indicator {
  color: #000;
  font-size: 12px;
  font-style: italic;
  font-family: Georgia, serif;
  min-width: 90px;
  text-align: center;
  letter-spacing: 0.03em;
}

/* ══════════════════════════════════════════
   BOOK WRAP — outer container
   Wide: column layout, tabs sit on top edge
   Narrow: row layout, tabs on left or right side
══════════════════════════════════════════ */
#book-wrap {
  max-width: min(880px, calc((100vh - 140px) * 6 / 5));
  width: 100%;
  display: flex;
  flex-direction: column;   /* tabs above book by default */
  align-items: stretch;
  position: relative;
}

/* ── TOP TABS (wide screens) ── */
#tabs-top {
  display: flex;
  flex-direction: row;
  align-items: flex-end;
  justify-content: space-between;
  gap: 3px;
  padding: 0 2px 0 2px;
  user-select: none;
  position: relative;
  z-index: 3;
  /* sits flush against the book top */
  margin-bottom: -1px;
}

.tab-group {
  display: flex;
  flex-direction: row;
  gap: 2px;
  align-items: flex-end;
}

/* ── SIDE TABS (narrow screens) ── */
#tabs-side {
  display: none;   /* hidden by default, shown on narrow */
  flex-direction: column;
  gap: 3px;
  align-items: flex-start;
  user-select: none;
  position: absolute;
  top: 0;
  z-index: 3;
}
#tabs-side.side-left  { left: -34px; align-items: flex-end; }
#tabs-side.side-right { right: -34px; align-items: flex-start; }

/* ── SHARED TAB BUTTON ── */
.tab {
  background: #d0d0d0;
  color: #000;
  border: 1px solid #000;
  font-size: 13px;
  font-family: 'Noto Serif JP', 'Times New Roman', serif;
  font-weight: 700;
  cursor: pointer;
  line-height: 1;
  transition: background 0.12s;
  white-space: nowrap;
  user-select: none;
}
.tab:hover { background: #e8e8e8; color: #000; }
.tab.active {
  background: #ffffff;
  color: #000;
  border-color: #000;
  z-index: 4;
}

/* Top-tab shape: rounded top, no bottom border, bleeds into book */
.tab-top {
  border-bottom: none;
  border-radius: 5px 5px 0 0;
  padding: 4px 8px 3px;
  box-shadow: 0 -1px 4px rgba(0,0,0,0.2);
  position: relative;
  bottom: -1px;
}
.tab-top.active {
  border-bottom-color: #ffffff;
  box-shadow: 0 -2px 6px rgba(0,0,0,0.15);
}

/* Side-tab shape: rounded outside edge, no inner border, bleeds into book */
.tab-side-left {
  border-right: none;
  border-radius: 5px 0 0 5px;
  padding: 5px 6px 5px 7px;
  box-shadow: -2px 0 4px rgba(0,0,0,0.18);
  position: relative;
  right: -1px;
}
.tab-side-left.active {
  border-right-color: #ffffff;
  box-shadow: -2px 0 6px rgba(0,0,0,0.15);
}
.tab-side-right {
  border-left: none;
  border-radius: 0 5px 5px 0;
  padding: 5px 7px 5px 6px;
  box-shadow: 2px 0 4px rgba(0,0,0,0.18);
  position: relative;
  left: -1px;
}
.tab-side-right.active {
  border-left-color: #ffffff;
}

/* ── BOOK SPREAD ── */
#spread-wrap {
  display: flex;
  flex-direction: row;
  align-items: stretch;
  position: relative;
}

#spread {
  display: flex;
  gap: 0;
  box-shadow: 3px 5px 22px rgba(0,0,0,0.55);
  width: 100%;
  border: 1px solid #000;
  position: relative;
  z-index: 1;
  aspect-ratio: 6 / 5;
}

/* ── SINGLE PAGE ── */
.page {
  background: #ffffff;
  color: #000;
  width: 50%;
  flex-shrink: 0;
  height: 100%;
  display: flex;
  flex-direction: column;
  border: none;
  overflow: hidden;
}
.page.left  { border-right: 1px solid #000; }

/* ── NARROW: side tabs ── */
@media (max-width: 560px) {
  #tabs-top  { display: none; }
  #tabs-side { display: flex; }
  body { padding-left: 44px; padding-right: 44px; }
}




/* ── Page header ── */
.page-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  border-bottom: 1.5px solid #000;
  padding: 3px 7px 2px 7px;
  flex-shrink: 0;
  background: #ffffff;
}

.hw-range {
  font-size: 6.5pt;
  font-weight: bold;
  font-style: italic;
}
.pg { font-size: 6.5pt; }

/* ── Two-column grid inside a page ── */
.cols {
  display: grid;
  grid-template-columns: 1fr 1fr;
  flex: 1;
  min-height: 0;
  overflow: hidden;
}

.col {
  padding: 2px 4px 2px 5px;
  overflow: hidden;
}
.col:first-child { border-right: 0.75px solid #000; }

/* ── Section kana header ── */
.sec {
  font-size: 6.5pt;
  font-weight: bold;
  border-bottom: 0.5px solid #000;
  margin: 3px 0 1.5px 0;
  line-height: 1.1;
  padding-bottom: 0.5px;
}

/* ── Entry ── */
.e {
  font-size: 5.7pt;
  line-height: 1.3;
  margin-bottom: 1.5px;
  text-indent: -7px;
  padding-left: 7px;
}

.hw {
  font-weight: bold;
  font-size: 6.2pt;
  font-family: 'Noto Serif JP', 'Times New Roman', serif;
}

ruby { font-family: 'Noto Serif JP', 'Times New Roman', serif; }
rt {
  font-size: 3.8pt;
  font-weight: 400;
  letter-spacing: 0;
  line-height: 1.1;
}

.rom { font-style: italic; font-weight: normal; font-size: 5.5pt; }
.pos { font-style: italic; font-size: 5.2pt; }
.df  { font-size: 5.7pt; }
.xr  { font-style: italic; font-size: 5.2pt; }
.sn  { font-weight: bold; font-size: 5.2pt; }

.note {
  border: 0.5px solid #000;
  padding: 2px 2.5px;
  margin: 2px 0;
  font-size: 5.1pt;
  line-height: 1.3;
}
.note-lbl {
  font-weight: bold;
  font-size: 4.9pt;
  letter-spacing: 0.05em;
}

/* ── Empty state (shown when the real dictionary has no entries yet) ── */
.empty-state {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 28px 22px;
  font-family: 'Noto Serif JP', 'Linux Libertine', 'Times New Roman', serif;
  color: #000;
}
.empty-state .empty-title {
  font-size: 12pt;
  font-weight: 700;
  margin-bottom: 8px;
  letter-spacing: 0.02em;
}
.empty-state .empty-body {
  font-size: 9pt;
  font-style: italic;
  opacity: 0.7;
  max-width: 28ch;
  line-height: 1.45;
}

/* ── Responsive: narrow → single page ── */
@media (max-width: 480px) {
  #spread { max-width: 340px; }
  #spread .page.hidden-narrow { display: none; }
}
</style>
</head>
<body>

<div id="nav">
  <span id="indicator"></span>
</div>

<div id="book-wrap">
  <button class="nav-btn" id="btn-prev" aria-label="Previous page"></button>
  <button class="nav-btn" id="btn-next" aria-label="Next page"></button>
  <div id="tabs-top"></div>
  <div id="spread-wrap">
    <div id="tabs-side"></div>
    <div id="spread"></div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════
   LIVE RENDERER
   ─────────────────────────────────────────────
   The visible dictionary is driven by the real Dexie-backed backend in
   src/domains/dictionary via the React bridge in LegacyDesignFrame.tsx.
   The bridge calls:
       window.__kotobaDictionary.renderEntries(entries)
   where `entries` is an array of DictionaryEntry values. This file owns
   only the markup and styling — it never imports data.

   Empty state is shown until the bridge fires, so a direct visit to
   /dictionary.html (without the React shell) still looks coherent.
═══════════════════════════════════════════════ */
(function () {
  var spreadEl = document.getElementById('spread');
  var tabsTopEl = document.getElementById('tabs-top');
  var indicatorEl = document.getElementById('indicator');
  var btnPrev = document.getElementById('btn-prev');
  var btnNext = document.getElementById('btn-next');

  /** Part-of-speech abbreviations used by the dictionary book. */
  var POS_LABEL = {
    'noun': 'n.',
    'particle': 'part.',
    'verb': 'v.',
    'ru-verb': 'v.',
    'godan-verb': 'v.',
    'verb-exception': 'v.',
    'adjective': 'adj.',
    'adverb': 'adv.',
    'conjunction': 'conj.',
    'interjection': 'interj.',
    'pronoun': 'pron.',
    'counter': 'ctr.',
    'prefix': 'pref.',
    'suffix': 'suf.',
    'auxiliary': 'aux.',
    'expression': 'expr.'
  };

  /** One section == one book spread. */
  var sections = [];
  var currentIndex = 0;

  function escapeHtml(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  /** Render one `.e` dictionary entry, preserving ruby/rt when reading is present. */
  function entryHtml(e) {
    var surface = escapeHtml(e.surface);
    var reading = (e.reading || '').trim();
    var useRuby = reading.length > 0 && reading !== e.surface;
    var hw = useRuby
      ? '<ruby>' + surface + '<rt>' + escapeHtml(reading) + '</rt></ruby>'
      : surface;
    var romaji = (e.romaji || '').trim();
    var rom = romaji ? ' <span class="rom">(' + escapeHtml(romaji) + ')</span>' : '';
    var posLabel = e.type ? (POS_LABEL[e.type] || e.type) : '';
    var pos = posLabel ? ' <span class="pos">' + escapeHtml(posLabel) + '</span>' : '';
    var meaning = escapeHtml(e.meaning || '');
    var df = meaning ? ' <span class="df">' + meaning + '</span>' : '';
    return '<div class="e"><span class="hw">' + hw + '</span>' + rom + pos + df + '</div>';
  }

  function renderPage(label, pageNum, items, sideClass) {
    var mid = Math.ceil(items.length / 2);
    var col1 = items.slice(0, mid).map(entryHtml).join('');
    var col2 = items.slice(mid).map(entryHtml).join('');
    return '<div class="page ' + sideClass + '">'
      + '<div class="page-header">'
      +   '<span class="hw-range">' + escapeHtml(label) + '</span>'
      +   '<span class="pg">' + pageNum + '</span>'
      + '</div>'
      + '<div class="cols">'
      +   '<div class="col">' + (col1 || '&nbsp;') + '</div>'
      +   '<div class="col">' + (col2 || '&nbsp;') + '</div>'
      + '</div>'
      + '</div>';
  }

  function renderSpread(section, sectionIndex) {
    var half = Math.ceil(section.entries.length / 2);
    var leftEntries = section.entries.slice(0, half);
    var rightEntries = section.entries.slice(half);
    var pageNum = sectionIndex * 2 + 1;
    var label = section.letter.toUpperCase();
    spreadEl.innerHTML =
      renderPage(label, pageNum, leftEntries, 'left')
      + renderPage(label, pageNum + 1, rightEntries, 'right');
  }

  function renderTabs() {
    tabsTopEl.innerHTML = '';
    if (sections.length === 0) return;
    var group = document.createElement('div');
    group.className = 'tab-group';
    sections.forEach(function (section, i) {
      var btn = document.createElement('button');
      btn.className = 'tab tab-top' + (i === currentIndex ? ' active' : '');
      btn.type = 'button';
      btn.textContent = section.letter.toUpperCase();
      btn.addEventListener('click', function () {
        currentIndex = i;
        refreshView();
      });
      group.appendChild(btn);
    });
    tabsTopEl.appendChild(group);
  }

  function setIndicator() {
    if (sections.length === 0) {
      indicatorEl.textContent = '';
      return;
    }
    indicatorEl.textContent = (currentIndex + 1) + ' / ' + sections.length;
  }

  function setNavState() {
    btnPrev.disabled = currentIndex <= 0 || sections.length === 0;
    btnNext.disabled = currentIndex >= sections.length - 1 || sections.length === 0;
  }

  function refreshView() {
    if (sections.length === 0) {
      renderEmpty('Save a word from a song to start your dictionary.');
      return;
    }
    renderTabs();
    renderSpread(sections[currentIndex], currentIndex);
    setIndicator();
    setNavState();
  }

  function renderEmpty(message) {
    tabsTopEl.innerHTML = '';
    indicatorEl.textContent = '';
    btnPrev.disabled = true;
    btnNext.disabled = true;
    spreadEl.innerHTML =
      '<div class="page left"><div class="empty-state">'
      +   '<div class="empty-title">辞書は空です</div>'
      +   '<div class="empty-body">' + escapeHtml(message) + '</div>'
      + '</div></div>'
      + '<div class="page right"><div class="empty-state">'
      +   '<div class="empty-title">Dictionary is empty</div>'
      +   '<div class="empty-body">Click a word in a song to save it here.</div>'
      + '</div></div>';
  }

  /**
   * Group entries into sections by firstLetter. Works uniformly for
   * ja-en (firstLetter derived from romaji) and en-ja (first char of
   * surface) — both collapse to the same latin axis in the backend.
   */
  function groupBySection(entries) {
    var byLetter = Object.create(null);
    var order = [];
    for (var i = 0; i < entries.length; i++) {
      var e = entries[i];
      var key = (e.firstLetter || '?').toLowerCase();
      if (!byLetter[key]) {
        byLetter[key] = [];
        order.push(key);
      }
      byLetter[key].push(e);
    }
    order.sort(function (a, b) { return a.localeCompare(b); });
    return order.map(function (letter) {
      var list = byLetter[letter].slice();
      list.sort(function (a, b) {
        var ka = (a.normalizedTerm || a.surface || '').toString();
        var kb = (b.normalizedTerm || b.surface || '').toString();
        return ka.localeCompare(kb);
      });
      return { letter: letter, entries: list };
    });
  }

  btnPrev.addEventListener('click', function () {
    if (currentIndex > 0) {
      currentIndex--;
      refreshView();
    }
  });
  btnNext.addEventListener('click', function () {
    if (currentIndex < sections.length - 1) {
      currentIndex++;
      refreshView();
    }
  });

  /**
   * Bridge API consumed by src/frontend/LegacyDesignFrame.tsx.
   * Every time the dictionary overlay opens, the bridge calls
   * renderEntries(await dictionary.getAll()) so newly-saved words
   * surface without a page reload.
   */
  window.__kotobaDictionary = {
    renderEntries: function (entries) {
      sections = Array.isArray(entries) && entries.length > 0
        ? groupBySection(entries)
        : [];
      currentIndex = 0;
      refreshView();
    },
    showEmpty: function (message) {
      sections = [];
      currentIndex = 0;
      renderEmpty(typeof message === 'string' && message.length > 0
        ? message
        : 'Save a word from a song to start your dictionary.');
    }
  };

  // Initial paint: empty state so a standalone visit to /dictionary.html
  // (no React shell) still looks coherent. The bridge overwrites this.
  renderEmpty('Loading your saved words…');
})();
</script>
</body>
</html>
