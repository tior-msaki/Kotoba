<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kotoba — Open from YouTube Music</title>
<link href="https://fonts.googleapis.com/css2?family=Forum&family=Gamja+Flower&family=Noto+Serif+JP:wght@400;700&family=Linux+Libertine:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%;
  height: 100vh;
  background: transparent;
  overflow: hidden;
  color: #000;
  font-family: 'Linux Libertine', 'Times New Roman', serif;
}
body {
  opacity: 0;
  transition: opacity 0.35s ease;
}
body.page-ready { opacity: 1; }

.viewport {
  width: 100vw;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.search-stage {
  position: relative;
  width: 1440px;
  height: 1024px;
  transform-origin: center center;
  flex-shrink: 0;
  background: #ffffff;
}

.surface {
  position: absolute;
  left: 120px;
  top: 60px;
  width: 1200px;
  height: 904px;
  background: #ffffff;
  border: 1px solid #000;
  box-shadow: 3px 5px 22px rgba(0,0,0,0.55);
  padding: 24px 32px 28px;
  display: flex;
  flex-direction: column;
}

.surface-header {
  display: flex;
  align-items: baseline;
  gap: 16px;
  padding-bottom: 12px;
  border-bottom: 1.5px solid #000;
  flex-shrink: 0;
}
.back-btn {
  width: 42px;
  height: 42px;
  background: transparent url("assets/disk%20select/left%20arrow.png") no-repeat center/contain;
  border: none;
  padding: 0;
  cursor: pointer;
  flex-shrink: 0;
  transition: opacity 0.15s;
}
.back-btn:hover { opacity: 0.7; }

.page-title {
  font-family: 'Forum', serif;
  font-size: 30px;
  line-height: 1;
  letter-spacing: 0.01em;
}
.page-caption {
  font-family: 'Gamja Flower', cursive;
  font-size: 18px;
  opacity: 0.65;
  margin-left: 8px;
}

/* URL row — wider input, same underline-only style as lyric paste. */
.url-row {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-top: 14px;
  flex-shrink: 0;
}
.url-lbl {
  font-family: 'Gamja Flower', cursive;
  font-size: 17px;
  opacity: 0.65;
  letter-spacing: 0.04em;
  white-space: nowrap;
}
.url-input {
  flex: 1;
  font-family: 'Noto Serif JP', 'Linux Libertine', serif;
  font-size: 18px;
  padding: 6px 8px;
  border: 0;
  border-bottom: 1px solid #000;
  background: transparent;
  outline: none;
}
.url-input::placeholder {
  font-family: 'Gamja Flower', cursive;
  opacity: 0.55;
  font-size: 16px;
}
.load-btn {
  font-family: 'Forum', serif;
  font-size: 17px;
  background: #ffffff;
  border: 1px solid #000;
  padding: 5px 16px;
  cursor: pointer;
  color: #000;
  white-space: nowrap;
}
.load-btn:hover { background: #f2eadd; }
.load-btn:disabled { opacity: 0.5; cursor: wait; }

.status-row {
  margin-top: 8px;
  min-height: 18px;
  font-family: 'Gamja Flower', cursive;
  font-size: 14px;
  opacity: 0.6;
}

/* Playlist header shown once a playlist is loaded. */
.playlist-header {
  display: none;
  margin-top: 12px;
  padding: 10px 14px;
  background: #fffdfa;
  border: 0.75px solid #000;
  align-items: center;
  gap: 14px;
  flex-shrink: 0;
}
.playlist-header.open { display: flex; }
.playlist-header .ph-thumb {
  width: 56px;
  height: 56px;
  background: #d0d0d0;
  background-size: cover;
  background-position: center;
  border: 0.5px solid #000;
  flex-shrink: 0;
}
.playlist-header .ph-body { flex: 1; min-width: 0; }
.playlist-header .ph-name {
  font-family: 'Forum', serif;
  font-size: 19px;
  line-height: 1.2;
}
.playlist-header .ph-sub {
  font-family: 'Gamja Flower', cursive;
  font-size: 14px;
  opacity: 0.6;
  margin-top: 2px;
}

.results {
  flex: 1;
  min-height: 0;
  overflow: auto;
  margin-top: 12px;
  border: 1px solid #000;
  background: #fffdfa;
}
.result-row {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 10px 14px;
  border-bottom: 0.5px solid #000;
  cursor: pointer;
  transition: background 0.12s;
}
.result-row:last-child { border-bottom: 0; }
.result-row:hover { background: #f5edde; }
.result-row.active {
  background: #ffe9b6;
  border-left: 3px solid #000;
  padding-left: 11px;
}
.result-index {
  font-family: 'Linux Libertine', serif;
  font-style: italic;
  opacity: 0.55;
  font-size: 13px;
  min-width: 24px;
  text-align: right;
  flex-shrink: 0;
}
.result-thumb {
  flex-shrink: 0;
  width: 56px;
  height: 56px;
  background: #d0d0d0;
  background-size: cover;
  background-position: center;
  border: 0.5px solid #000;
}
.result-body { flex: 1; min-width: 0; }
.result-title {
  font-family: 'Noto Serif JP', 'Linux Libertine', serif;
  font-size: 16px;
  font-weight: 700;
  line-height: 1.25;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.result-sub {
  font-family: 'Linux Libertine', serif;
  font-size: 13px;
  opacity: 0.75;
  line-height: 1.3;
  margin-top: 2px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.result-sub .sep { opacity: 0.45; margin: 0 6px; }
.result-meta {
  flex-shrink: 0;
  font-family: 'Linux Libertine', serif;
  font-style: italic;
  font-size: 13px;
  opacity: 0.7;
  min-width: 48px;
  text-align: right;
}
.result-action {
  font-family: 'Forum', serif;
  font-size: 14px;
  background: none;
  border: none;
  cursor: pointer;
  text-decoration: underline;
  color: #000;
  padding: 0;
  margin-left: 6px;
}
.result-action:hover { opacity: 0.7; }

.empty-pane {
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 28px;
  gap: 12px;
}
.empty-pane .big {
  font-family: 'Forum', serif;
  font-size: 26px;
}
.empty-pane .note {
  font-family: 'Gamja Flower', cursive;
  font-size: 17px;
  opacity: 0.7;
  max-width: 48ch;
  line-height: 1.45;
}
.empty-pane code {
  font-family: 'Linux Libertine', serif;
  font-size: 14px;
  background: #fffaf0;
  border: 0.5px solid #000;
  padding: 2px 6px;
}
.empty-pane .ghost-btn {
  font-family: 'Forum', serif;
  font-size: 17px;
  background: #ffffff;
  border: 1px solid #000;
  padding: 5px 14px;
  cursor: pointer;
}
.empty-pane .ghost-btn:hover { background: #f2eadd; }

.playback-note {
  margin-top: 10px;
  padding: 6px 10px;
  background: #fff3c2;
  border: 0.5px solid #000;
  font-family: 'Gamja Flower', cursive;
  font-size: 14px;
  opacity: 0.9;
  letter-spacing: 0.02em;
  flex-shrink: 0;
}

.results::-webkit-scrollbar { width: 8px; }
.results::-webkit-scrollbar-thumb {
  background: rgba(0,0,0,0.3);
  border-radius: 4px;
}
</style>
</head>
<body>

<div class="viewport">
  <div class="search-stage">
    <div class="surface">

      <div class="surface-header">
        <button class="back-btn" id="backBtn" title="Close"></button>
        <span class="page-title">Open from YouTube Music</span>
        <span class="page-caption">paste a playlist or song URL</span>
      </div>

      <div class="url-row">
        <span class="url-lbl">URL</span>
        <input type="text" class="url-input" id="urlInput"
               placeholder="https://music.youtube.com/playlist?list=…  or  https://music.youtube.com/watch?v=…"
               autocomplete="off" spellcheck="false" />
        <button class="load-btn" id="submitBtn" type="button">load</button>
      </div>
      <div class="status-row" id="statusRow"></div>

      <div class="playlist-header" id="playlistHeader">
        <div class="ph-thumb" id="playlistThumb"></div>
        <div class="ph-body">
          <div class="ph-name" id="playlistName"></div>
          <div class="ph-sub" id="playlistSub"></div>
        </div>
      </div>

      <div class="results" id="results"></div>

      <div class="playback-note">
        ♫ Playback isn't wired — YouTube Music's public API returns metadata
        and lyrics only, not streamable audio. Selecting a track fetches its
        lyrics (when available) and opens them in the translation view.
      </div>

    </div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════
   OPEN-FROM-URL OVERLAY
   ─────────────────────────────────────────────
   Flow:
     1. User pastes a YouTube / YouTube Music URL.
     2. We hand the pasted string to the React bridge's `parseUrl`
        (backed by src/domains/music-search/url.ts).
     3. Bridge returns one of: playlist / song / watch-with-playlist /
        unsupported. We fetch the appropriate resource via the bridge's
        `getPlaylist` / `getSong` callbacks.
     4. Render the track list. A `watch` URL inside a playlist behaves the
        same as a playlist, with the watched video highlighted + auto-
        focused (first of list-containing watches is still a 1-track UX
        if the user wants it).
     5. Clicking a track fetches its lyrics through `getLyrics`, then
        hands `{title, artist, lyrics}` off to the lyric translation
        interface via `onSelect(track, { lyrics })`.

   Public API:
     window.__kotobaSearch.setParseUrl(fn)
     window.__kotobaSearch.setGetPlaylist(fn)
     window.__kotobaSearch.setGetSong(fn)
     window.__kotobaSearch.setGetLyrics(fn)
     window.__kotobaSearch.setOnSelect(fn)
     window.__kotobaSearch.setClose(fn)
     window.__kotobaSearch.open()
     window.__kotobaSearch.reset()
═══════════════════════════════════════════════ */
(function () {
  var state = {
    parsed: null,          // ParsedMusicUrl from parseUrl, or null
    playlist: null,        // MusicPlaylist when loaded
    tracks: [],            // convenience reference
    activeVideoId: null,   // highlighted track (NOT yet submitted)
    selectedVideoId: null, // track whose lyrics we're loading / loaded
    loading: false,        // playlist fetch in flight
    lyricsLoading: false,  // lyrics fetch in flight
    error: null,
    lastAbort: null
  };

  var callbacks = {
    parseUrl: null,
    getPlaylist: null,
    getSong: null,
    getLyrics: null,
    onSelect: null,
    close: null
  };

  var urlInput = document.getElementById('urlInput');
  var submitBtn = document.getElementById('submitBtn');
  var backBtn = document.getElementById('backBtn');
  var statusRow = document.getElementById('statusRow');
  var resultsEl = document.getElementById('results');
  var playlistHeader = document.getElementById('playlistHeader');
  var playlistThumb = document.getElementById('playlistThumb');
  var playlistName = document.getElementById('playlistName');
  var playlistSub = document.getElementById('playlistSub');

  function escapeHtml(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function formatDuration(ms) {
    if (ms == null || !isFinite(ms) || ms <= 0) return '';
    var totalSec = Math.round(ms / 1000);
    var m = Math.floor(totalSec / 60);
    var s = totalSec % 60;
    return m + ':' + (s < 10 ? '0' + s : s);
  }

  function setStatus(text) { statusRow.textContent = text || ''; }

  function hidePlaylistHeader() {
    playlistHeader.classList.remove('open');
    playlistThumb.style.backgroundImage = '';
    playlistName.textContent = '';
    playlistSub.textContent = '';
  }

  function showPlaylistHeader(playlist) {
    if (!playlist) { hidePlaylistHeader(); return; }
    playlistHeader.classList.add('open');
    if (playlist.thumbnailUrl) {
      playlistThumb.style.backgroundImage = 'url(' + JSON.stringify(playlist.thumbnailUrl) + ')';
    } else {
      playlistThumb.style.backgroundImage = '';
    }
    playlistName.textContent = playlist.name || 'Untitled playlist';
    var bits = [];
    if (playlist.artist) bits.push(playlist.artist);
    bits.push(
      playlist.tracks.length + ' of ' + playlist.trackCount
      + ' track' + (playlist.trackCount === 1 ? '' : 's')
    );
    playlistSub.textContent = bits.join(' · ');
  }

  function resultRowHtml(r, index, activeVideoId, selectedVideoId, lyricsLoading) {
    var isActive = r.videoId === activeVideoId;
    var isSelected = r.videoId === selectedVideoId;
    var cls = 'result-row';
    if (isActive || isSelected) cls += ' active';
    var thumbStyle = r.thumbnailUrl
      ? 'background-image:url(' + JSON.stringify(r.thumbnailUrl) + ');'
      : '';
    var subParts = [];
    subParts.push(escapeHtml(r.artist || 'Unknown artist'));
    if (r.album) subParts.push(escapeHtml(r.album));
    var sub = subParts.join('<span class="sep">·</span>');
    var duration = formatDuration(r.durationMs);
    var actionLabel = isSelected && lyricsLoading
      ? 'loading lyrics…'
      : (isSelected ? 'open in lyric' : 'select');
    return (
      '<div class="' + cls + '" data-video-id="' + escapeHtml(r.videoId) + '">'
      + '<div class="result-index">' + (index + 1) + '</div>'
      + '<div class="result-thumb" style="' + thumbStyle + '"></div>'
      + '<div class="result-body">'
      +   '<div class="result-title">' + escapeHtml(r.title) + '</div>'
      +   '<div class="result-sub">' + sub + '</div>'
      + '</div>'
      + '<div class="result-meta">' + escapeHtml(duration) + '</div>'
      + '<button class="result-action" type="button" data-action="open"'
      +   (lyricsLoading && isSelected ? ' disabled' : '') + '>'
      +   escapeHtml(actionLabel)
      + '</button>'
      + '</div>'
    );
  }

  function renderIdle() {
    hidePlaylistHeader();
    resultsEl.innerHTML =
      '<div class="empty-pane">'
      + '<div class="big">Open from YouTube Music</div>'
      + '<div class="note">Paste a <code>music.youtube.com/playlist?list=…</code> or <code>music.youtube.com/watch?v=…</code> URL above and press enter. The tracks will load here, and clicking one pulls its lyrics into the translation view.</div>'
      + '</div>';
  }

  function renderLoading(label) {
    resultsEl.innerHTML =
      '<div class="empty-pane">'
      + '<div class="big">' + escapeHtml(label || 'loading…') + '</div>'
      + '<div class="note">asking YouTube Music…</div>'
      + '</div>';
  }

  function renderError(message, retryLabel) {
    resultsEl.innerHTML =
      '<div class="empty-pane">'
      + '<div class="big">couldn’t load</div>'
      + '<div class="note">' + escapeHtml(message) + '</div>'
      + (retryLabel
          ? '<button class="ghost-btn" id="retryBtn" type="button">' + escapeHtml(retryLabel) + '</button>'
          : '')
      + '</div>';
    var retry = document.getElementById('retryBtn');
    if (retry) retry.addEventListener('click', function () { loadFromInput(); });
  }

  function renderEmptyPlaylist() {
    resultsEl.innerHTML =
      '<div class="empty-pane">'
      + '<div class="big">no tracks in this playlist</div>'
      + '<div class="note">YouTube Music returned an empty track list. Try a different URL.</div>'
      + '</div>';
  }

  function renderTracks() {
    if (!state.tracks.length) { renderEmptyPlaylist(); return; }
    var parts = [];
    for (var i = 0; i < state.tracks.length; i++) {
      parts.push(
        resultRowHtml(
          state.tracks[i], i,
          state.activeVideoId, state.selectedVideoId, state.lyricsLoading
        )
      );
    }
    resultsEl.innerHTML = parts.join('');
    wireResultClicks();
  }

  function wireResultClicks() {
    var rows = resultsEl.querySelectorAll('.result-row');
    for (var i = 0; i < rows.length; i++) {
      (function (row) {
        row.addEventListener('click', function (ev) {
          if (ev.target && ev.target.closest && ev.target.closest('[data-action="open"]')) {
            return;
          }
          var id = row.getAttribute('data-video-id');
          highlightTrack(id);
        });
        var openBtn = row.querySelector('[data-action="open"]');
        if (openBtn) openBtn.addEventListener('click', function (ev) {
          ev.stopPropagation();
          var id = row.getAttribute('data-video-id');
          highlightTrack(id);
          void openTrackInLyric(id);
        });
      })(rows[i]);
    }
  }

  function highlightTrack(videoId) {
    if (!videoId) return;
    state.activeVideoId = videoId;
    renderTracks();
  }

  async function openTrackInLyric(videoId) {
    if (!videoId || state.lyricsLoading) return;
    var hit = null;
    for (var i = 0; i < state.tracks.length; i++) {
      if (state.tracks[i].videoId === videoId) { hit = state.tracks[i]; break; }
    }
    if (!hit) return;

    state.selectedVideoId = videoId;
    state.lyricsLoading = true;
    setStatus('fetching lyrics for “' + (hit.title || videoId) + '”…');
    renderTracks();

    var lyrics = null;
    var lyricsError = null;
    try {
      if (callbacks.getLyrics) {
        var r = await callbacks.getLyrics(videoId);
        if (r && typeof r.text === 'string' && r.text.length > 0) {
          lyrics = r.text;
        }
      }
    } catch (err) {
      lyricsError = (err && err.message) ? err.message : String(err);
    }

    state.lyricsLoading = false;
    renderTracks();

    if (callbacks.onSelect) {
      try {
        callbacks.onSelect(hit, {
          lyrics: lyrics,
          lyricsError: lyricsError
        });
      } catch (e) {
        // swallow — the bridge surfaces errors in its own UI
      }
    }

    if (lyrics) {
      setStatus('opened in lyric view');
    } else if (lyricsError) {
      setStatus('lyrics unavailable: ' + lyricsError);
    } else {
      setStatus('no lyrics available — opened song metadata in lyric view');
    }
  }

  function cancelInFlight() {
    if (state.lastAbort) { try { state.lastAbort.abort(); } catch (e) {} }
    state.lastAbort = null;
  }

  async function loadFromInput() {
    var raw = (urlInput.value || '').trim();
    if (!callbacks.parseUrl) {
      state.error = 'URL parser not connected.';
      renderError(state.error);
      return;
    }
    var parsed = callbacks.parseUrl(raw);
    state.parsed = parsed;
    state.playlist = null;
    state.tracks = [];
    state.activeVideoId = null;
    state.selectedVideoId = null;
    state.error = null;

    if (!parsed || parsed.kind === 'unsupported') {
      state.error = (parsed && parsed.reason) || 'Unsupported URL.';
      setStatus('');
      hidePlaylistHeader();
      renderError(state.error);
      return;
    }

    cancelInFlight();
    var ctrl = (typeof AbortController !== 'undefined') ? new AbortController() : null;
    state.lastAbort = ctrl;
    state.loading = true;

    if (parsed.kind === 'playlist' || parsed.kind === 'watch-with-playlist') {
      setStatus('loading playlist…');
      renderLoading('loading playlist');
      try {
        if (!callbacks.getPlaylist) throw new Error('Playlist backend not connected.');
        var playlist = await callbacks.getPlaylist(parsed.playlistId, ctrl ? { signal: ctrl.signal } : {});
        if (state.lastAbort !== ctrl) return;
        state.playlist = playlist;
        state.tracks = playlist.tracks || [];
        // If URL was watch-with-playlist, pre-highlight that track.
        if (parsed.kind === 'watch-with-playlist' && parsed.videoId) {
          state.activeVideoId = parsed.videoId;
        }
        state.loading = false;
        showPlaylistHeader(playlist);
        renderTracks();
        setStatus(state.tracks.length + ' track' + (state.tracks.length === 1 ? '' : 's') + ' loaded');
      } catch (err) {
        if (err && err.name === 'AbortError') return;
        state.loading = false;
        state.error = (err && err.message) ? err.message : String(err);
        hidePlaylistHeader();
        renderError(state.error, 'try again');
        setStatus('');
      }
      return;
    }

    if (parsed.kind === 'song') {
      setStatus('loading track…');
      renderLoading('loading track');
      try {
        if (!callbacks.getSong) throw new Error('Song backend not connected.');
        var track = await callbacks.getSong(parsed.videoId, ctrl ? { signal: ctrl.signal } : {});
        if (state.lastAbort !== ctrl) return;
        state.playlist = null;
        state.tracks = [track];
        state.activeVideoId = track.videoId;
        state.loading = false;
        hidePlaylistHeader();
        renderTracks();
        setStatus('1 track loaded');
      } catch (err) {
        if (err && err.name === 'AbortError') return;
        state.loading = false;
        state.error = (err && err.message) ? err.message : String(err);
        hidePlaylistHeader();
        renderError(state.error, 'try again');
        setStatus('');
      }
      return;
    }
  }

  submitBtn.addEventListener('click', function () { void loadFromInput(); });
  urlInput.addEventListener('keydown', function (ev) {
    if (ev.key === 'Enter') { ev.preventDefault(); void loadFromInput(); }
    else if (ev.key === 'Escape') {
      if (typeof callbacks.close === 'function') callbacks.close();
    }
  });
  backBtn.addEventListener('click', function () {
    if (typeof callbacks.close === 'function') callbacks.close();
  });

  window.__kotobaSearch = {
    open: function () { try { urlInput.focus(); urlInput.select(); } catch (e) {} },
    reset: function () {
      cancelInFlight();
      state.parsed = null;
      state.playlist = null;
      state.tracks = [];
      state.activeVideoId = null;
      state.selectedVideoId = null;
      state.lyricsLoading = false;
      state.loading = false;
      state.error = null;
      urlInput.value = '';
      setStatus('');
      hidePlaylistHeader();
      renderIdle();
    },
    setParseUrl: function (fn) { callbacks.parseUrl = fn; },
    setGetPlaylist: function (fn) { callbacks.getPlaylist = fn; },
    setGetSong: function (fn) { callbacks.getSong = fn; },
    setGetLyrics: function (fn) { callbacks.getLyrics = fn; },
    setOnSelect: function (fn) { callbacks.onSelect = fn; },
    setClose: function (fn) { callbacks.close = fn; },
    _getState: function () { return state; }
  };

  renderIdle();
  requestAnimationFrame(function () { document.body.classList.add('page-ready'); });
})();
</script>
</body>
</html>
