<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kotoba - Disk Select</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background: #FFFFFF;
        }

        body {
            opacity: 0;
            transition: opacity 0.35s ease;
        }

        body.page-ready {
            opacity: 1;
        }

        .viewport {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .disk-select {
            position: relative;
            width: 1440px;
            height: 1024px;
            background: #FFFFFF;
            transform-origin: center center;
            flex-shrink: 0;
        }

        .disk-select > div {
            background-repeat: no-repeat;
            background-size: contain;
            user-select: none;
            -webkit-user-drag: none;
        }

        .title-bubble {
            position: absolute;
            width: 1310px;
            height: 248px;
            left: 78px;
            top: 77px;
            background-image: url("assets/disk select/title bubble.png");
        }

        .playlist-title {
            position: absolute;
            width: 875px;
            height: 63px;
            left: calc(50% - 875px/2 + 17.5px);
            top: 155px;
            font-family: 'Gamja Flower', cursive;
            font-style: normal;
            font-weight: 400;
            font-size: 50px;
            line-height: 62px;
            color: #000000;
            text-align: center;
        }

        .cd {
            position: absolute;
            width: 355px;
            height: 363px;
            left: -1000px;
            top: 800px;
            opacity: 0;
            cursor: pointer;
            transition: left 0.35s ease, top 0.35s ease, opacity 0.35s ease;
        }

        .cd.no-transition {
            transition: none;
        }

        .left-arrow {
            position: absolute;
            width: 182px;
            height: 134px;
            left: 529px;
            top: 790px;
            background-image: url("assets/disk select/left arrow.png");
            cursor: pointer;
            z-index: 20;
        }

        .right-arrow {
            position: absolute;
            width: 175px;
            height: 138px;
            left: 735px;
            top: 783px;
            background-image: url("assets/disk select/right arrow.png");
            cursor: pointer;
            z-index: 20;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Gamja+Flower&display=swap" rel="stylesheet">
</head>
<body>
    <div class="viewport">
        <div class="disk-select">
            <div class="title-bubble"></div>
            <div class="playlist-title"></div>
            <div class="left-arrow"></div>
            <div class="right-arrow"></div>
        </div>
    </div>
    <script>
        function scaleContent() {
            const scale = Math.min(window.innerWidth / 1440, window.innerHeight / 1024);
            document.querySelector('.disk-select').style.transform = `scale(${scale})`;
        }
        window.addEventListener('resize', scaleContent);
        scaleContent();

        requestAnimationFrame(() => document.body.classList.add('page-ready'));
        function navigateTo(url) {
            document.body.classList.remove('page-ready');
            setTimeout(() => { window.location.href = url; }, 350);
        }

        const playlists = Array.from({ length: 10 }, (_, i) => ({
            name: `Playlist ${i + 1}`,
            image: 'assets/disk select/cd.png',
        }));

        const SLOTS = {
            '-2': { left: -252, top: 620, opacity: 1, z: 1 },
            '-1': { left: 123,  top: 435, opacity: 1, z: 2 },
            '0':  { left: 542,  top: 345, opacity: 1, z: 3 },
            '1':  { left: 980,  top: 420, opacity: 1, z: 2 },
            '2':  { left: 1335, top: 620, opacity: 1, z: 1 },
        };
        const OFF_LEFT  = { left: -700,  top: 800, opacity: 0, z: 0 };
        const OFF_RIGHT = { left: 1700,  top: 800, opacity: 0, z: 0 };

        function slotFor(offset) {
            if (SLOTS[offset]) return SLOTS[offset];
            return offset < 0 ? OFF_LEFT : OFF_RIGHT;
        }

        const stage = document.querySelector('.disk-select');
        const titleEl = document.querySelector('.playlist-title');
        let currentIndex = 0;
        const prevOffsets = new Map();

        // Slot memory handoff: the React bridge reads this key at save
        // time to bind each slot record to the carousel position the user
        // picked. No other side effects — purely additive.
        const PLAYLIST_SLOT_KEY = 'kotoba-current-playlist-slot';
        function markSlotSelected() {
            try { localStorage.setItem(PLAYLIST_SLOT_KEY, String(currentIndex)); }
            catch (e) { /* private mode / quota — autosave silently falls back to 'default' */ }
        }

        // ── Slot-name lookup ────────────────────────────────────────────
        // The React bridge's finishBurn() already persists each burned
        // playlist under a per-slot record keyed by
        //   kotoba-slot-v1:<encoded playlistSlotId>/<encoded cdSlotId>
        // carrying { source: { provider, playlistId, playlistName, tracks } }.
        // (See src/domains/playlist/slotMemory.ts for the canonical shape.)
        // Here we mirror the same prefix + parsing so the carousel label
        // shows the real playlist name instead of the generic "Playlist N"
        // when a slot has a saved burned playlist. The filter matches the
        // predicate used by hydrateBurnedCdFromSlot() so the carousel's
        // label always agrees with what the home page will actually show.
        const SLOT_KEY_PREFIX = 'kotoba-slot-v1:';
        function readPlaylistNameForIndex(i) {
            var wanted = String(i);
            var bestAt = -1;
            var bestName = null;
            try {
                for (var k = 0; k < localStorage.length; k++) {
                    var key = localStorage.key(k);
                    if (typeof key !== 'string' || key.indexOf(SLOT_KEY_PREFIX) !== 0) continue;
                    var body = key.slice(SLOT_KEY_PREFIX.length);
                    var slash = body.indexOf('/');
                    if (slash <= 0 || slash === body.length - 1) continue;
                    var pid;
                    try { pid = decodeURIComponent(body.slice(0, slash)); }
                    catch (e) { continue; }
                    if (pid !== wanted) continue;
                    var raw = localStorage.getItem(key);
                    if (!raw) continue;
                    var parsed;
                    try { parsed = JSON.parse(raw); }
                    catch (e) { continue; }
                    if (!parsed || typeof parsed !== 'object') continue;
                    // Match slotMemory's own version guard — a future v2
                    // record with a different shape must not be read by
                    // v1-only code here.
                    if (parsed.version !== 1) continue;
                    var src = parsed.source;
                    if (!src || typeof src !== 'object') continue;
                    // Only consider real burned sources — matches
                    // hydrateBurnedCdFromSlot's predicate so the carousel
                    // never shows a label for a slot home.html would
                    // decline to restore. Every condition below mirrors
                    // that predicate exactly (provider, playlistId,
                    // playlistName, non-empty tracks).
                    if (src.provider !== 'spotify' && src.provider !== 'youtube') continue;
                    if (typeof src.playlistId !== 'string' || src.playlistId.length === 0) continue;
                    if (typeof src.playlistName !== 'string' || src.playlistName.length === 0) continue;
                    if (!Array.isArray(src.tracks) || src.tracks.length === 0) continue;
                    var savedAt = typeof parsed.savedAt === 'number' ? parsed.savedAt : 0;
                    if (savedAt > bestAt) {
                        bestAt = savedAt;
                        bestName = src.playlistName;
                    }
                }
            } catch (e) {
                // private mode / quota — fall back to the generic label.
                return null;
            }
            return bestName;
        }

        const cdEls = playlists.map((pl, i) => {
            const el = document.createElement('div');
            el.className = 'cd';
            el.style.backgroundImage = `url("${pl.image}")`;
            el.dataset.index = i;
            el.addEventListener('click', () => {
                if (i === currentIndex) {
                    markSlotSelected();
                    navigateTo('home.html');
                    return;
                }
                const n = playlists.length;
                let delta = i - currentIndex;
                if (delta > n / 2) delta -= n;
                if (delta < -n / 2) delta += n;
                currentIndex = (currentIndex + delta + n) % n;
                render();
            });
            stage.insertBefore(el, document.querySelector('.left-arrow'));
            return el;
        });

        function render() {
            const n = playlists.length;
            cdEls.forEach((el, i) => {
                let offset = i - currentIndex;
                while (offset > n / 2) offset -= n;
                while (offset < -n / 2) offset += n;

                const prev = prevOffsets.get(i);
                const jumped = prev !== undefined && Math.abs(offset - prev) > 1;
                if (jumped) {
                    el.classList.add('no-transition');
                    void el.offsetHeight;
                }

                const slot = slotFor(offset);
                el.style.left = slot.left + 'px';
                el.style.top = slot.top + 'px';
                el.style.opacity = slot.opacity;
                el.style.zIndex = slot.z;

                if (jumped) {
                    requestAnimationFrame(() => el.classList.remove('no-transition'));
                }
                prevOffsets.set(i, offset);
            });
            // Prefer the real saved playlist name for this carousel slot;
            // fall back to the generic "Playlist N" label when no burned
            // playlist has been assigned to this slot yet.
            var saved = readPlaylistNameForIndex(currentIndex);
            titleEl.textContent = (typeof saved === 'string' && saved.length > 0)
                ? saved
                : playlists[currentIndex].name;
        }

        function next() {
            currentIndex = (currentIndex + 1) % playlists.length;
            render();
        }
        function prev() {
            currentIndex = (currentIndex - 1 + playlists.length) % playlists.length;
            render();
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') { next(); e.preventDefault(); }
            else if (e.key === 'ArrowLeft') { prev(); e.preventDefault(); }
            else if (e.key === 'Enter' || e.key === ' ') {
                markSlotSelected();
                window.location.href = 'home.html';
                e.preventDefault();
            }
        });
        document.querySelector('.right-arrow').addEventListener('click', next);
        document.querySelector('.left-arrow').addEventListener('click', prev);

        render();
    </script>
</body>
</html>
